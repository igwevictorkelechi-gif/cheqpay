name: Deploy to Vercel (production)

# Deploys both Vercel projects on every push to the branches below:
#   - web  -> project "cheqpy"            (apps/web)
#   - api  -> project "cheqpay-admin453"  (apps/api, the custodial backend)
#
# One-time setup (can be done from a phone browser):
#   GitHub repo -> Settings -> Secrets and variables -> Actions ->
#   New repository secret:
#     Name:  VERCEL_TOKEN
#     Value: a token from https://vercel.com/account/tokens
#
# The org/project IDs below are not secrets, so they are committed here.
# Deploying via the Vercel CLI (instead of relying on Git integration) avoids
# the queue auto-cancellation we hit when multiple deploys pile up.

on:
  push:
    branches:
      - main
      - claude/cheq-pay-rebrand-kjehub
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: team_O46KPXuycwBw28agNvi9mK94

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    env:
      VERCEL_PROJECT_ID: prj_BWmR0rAverZJSF50IQVS9UxTVlzH
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: Deploy to production
        run: vercel deploy --prod --yes --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

  deploy-api:
    runs-on: ubuntu-latest
    env:
      VERCEL_PROJECT_ID: prj_dXZM6PuuQc4zfTUDFjrtMc29rJXP
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: Deploy to production
        run: vercel deploy --prod --yes --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

  # NOTE: the admin app (cheqpay-admin project) deploys via its own Vercel Git
  # integration. Set that project's Root Directory to "apps/admin" in the Vercel
  # dashboard; it then builds apps/admin/vercel.json on every push. (No CLI job
  # here, to avoid racing two production deploys onto the same project.)
